<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orange Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1a0f;
      color: #f0ede0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid rgba(201,162,39,0.2);
    }

    .logo { font-size: 56px; margin-bottom: 12px; }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #c9a227;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 15px;
      color: #7a9b82;
      letter-spacing: 0.5px;
    }

    main {
      width: 100%;
      max-width: 680px;
      padding: 40px 24px;
      flex: 1;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #c9a227;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .app-card {
      background: #14391e;
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }

    .app-card:hover { border-color: #c9a227; }

    .app-icon { font-size: 40px; }

    .app-info h2 {
      font-size: 17px;
      font-weight: 700;
      color: #f0ede0;
      margin-bottom: 4px;
    }

    .app-info p {
      font-size: 13px;
      color: #7a9b82;
      line-height: 1.5;
    }

    .contact-section {
      margin-top: 40px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #14391e;
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 12px;
      padding: 14px 20px;
      color: #c9a227;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: border-color 0.2s;
    }

    .contact-link:hover { border-color: #c9a227; }

    footer {
      width: 100%;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #7a9b82;
      border-top: 1px solid rgba(201,162,39,0.1);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🍊</div>
    <h1>Orange Studio</h1>
    <p class="tagline">簡單好用的小工具　·　Simple &amp; Useful Apps</p>
  </header>

  <main>
    <p class="section-title">Apps</p>

    <a class="app-card" href="#">
      <span class="app-icon">🎲</span>
      <div class="app-info">
        <h2>骰骰子 · Dice Roller</h2>
        <p>支援 D4 / D6 / D8 / D12 / D20，搖動手機即可擲骰。<br>
           Shake to roll. Supports D4, D6, D8, D12, D20.</p>
      </div>
    </a>

    <div class="contact-section">
      <p class="section-title">聯絡我們 · Contact</p>
      <a class="contact-link" href="mailto:orangestudiogo@gmail.com">
        ✉️ orangestudiogo@gmail.com
      </a>
    </div>
  </main>

  <footer>
    © 2026 Orange Studio · All rights reserved
  </footer>

</body>
</html>
